<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 道路提取系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">遥感道路提取系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">图片预测</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/history">历史记录</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white">欢迎, {{ username }}</span>
                    <button class="btn btn-outline-light" onclick="logout()">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-info text-white"><h5>我的预测历史记录</h5></div>
            <div class="card-body">
                <table class="table table-bordered table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>序号</th>
                            <th>文件名</th>
                            <th>预测时间</th>
                            <th>预测结果</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        <tr><td colspan="4" class="text-center">加载中...</td></tr>
                    </tbody>
                </table>
                <div class="d-flex justify-content-between align-items-center">
                    <span id="pageInfo"></span>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" id="prevBtn" onclick="changePage(-1)">上一页</button>
                        <button class="btn btn-sm btn-outline-secondary" id="nextBtn" onclick="changePage(1)">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed top-3 end-3" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if(!token) window.location.href='/login';

        let page = 1, pageSize = 10, totalPage = 1;

        function showToast(msg, ok=true){
            const t = document.getElementById('toast');
            t.innerHTML = `<div class="toast show text-white ${ok?'bg-success':'bg-danger'} p-2">${msg}</div>`;
            setTimeout(()=>t.innerHTML='',2500);
        }

        function logout(){
            localStorage.clear();
            window.location.href='/login';
        }

        async function loadHistory(){
            try{
                const res = await fetch(`/api/user/history?page=${page}&page_size=${pageSize}`,{
                    headers:{Authorization:`Bearer ${token}`}
                });
                const data = await res.json();
                totalPage = Math.ceil(data.total / pageSize);
                const tbody = document.getElementById('historyTable');
                const pageInfo = document.getElementById('pageInfo');
                
                if(data.data.length === 0){
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">暂无预测记录</td></tr>';
                    pageInfo.innerText = '共 0 条记录';
                    return;
                }

                tbody.innerHTML = data.data.map((item, i) => `
                    <tr>
                        <td>${(page-1)*pageSize + i + 1}</td>
                        <td>${item.filename}</td>
                        <td>${new Date(item.time).toLocaleString('zh-CN')}</td>
                        <td><img src="${item.result_path}" width="60" class="rounded"></td>
                    </tr>
                `).join('');
                pageInfo.innerText = `第 ${page} / ${totalPage} 页，共 ${data.total} 条记录`;
            }catch(e){
                showToast('加载失败：'+e.message, false);
            }
        }

        function changePage(delta){
            const newPage = page + delta;
            if(newPage >= 1 && newPage <= totalPage){
                page = newPage;
                loadHistory();
            }
        }

        loadHistory();
    </script>
</body>
</html>
