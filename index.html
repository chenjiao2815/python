<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道路提取 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .img-box {border: 1px solid #dee2e6; border-radius: 8px; padding:10px; min-height:300px;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">遥感道路提取系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">图片预测</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">历史记录</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white">欢迎, {{ username }}</span>
                    <button class="btn btn-outline-light" onclick="logout()">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white"><h5>原始图像</h5></div>
                    <div class="card-body">
                        <div class="img-box d-flex align-items-center justify-content-center" id="originalBox">
                            <p class="text-muted">点击下方按钮上传遥感图像</p>
                        </div>
                        <input type="file" id="imgFile" class="form-control mt-3" accept="image/*" onchange="previewImg()">
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning text-white"><h5>道路提取结果</h5></div>
                    <div class="card-body">
                        <div class="img-box d-flex align-items-center justify-content-center" id="resultBox">
                            <p class="text-muted">预测结果将显示在此</p>
                        </div>
                        <button class="btn btn-warning w-100 mt-3" id="predictBtn" disabled onclick="predict()">开始预测</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed top-3 end-3" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if(!token) window.location.href='/login';

        function showToast(msg, ok=true){
            const t = document.getElementById('toast');
            t.innerHTML = `<div class="toast show text-white ${ok?'bg-success':'bg-danger'} p-2">${msg}</div>`;
            setTimeout(()=>t.innerHTML='',2500);
        }

        function logout(){
            localStorage.clear();
            window.location.href='/login';
        }

        function previewImg(){
            const file = document.getElementById('imgFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e){
                document.getElementById('originalBox').innerHTML = `<img src="${e.target.result}" class="img-fluid rounded" style="max-height:280px;">`;
                document.getElementById('resultBox').innerHTML = '<p class="text-muted">预测结果将显示在此</p>';
                document.getElementById('predictBtn').disabled = false;
            }
            reader.readAsDataURL(file);
        }

        async function predict(){
            const file = document.getElementById('imgFile').files[0];
            const btn = document.getElementById('predictBtn');
            btn.disabled = true; btn.innerText = '预测中...';
            const form = new FormData(); form.append('file', file);
            try{
                const res = await fetch('/predict',{
                    method:'POST', headers:{Authorization:`Bearer ${token}`}, body:form
                });
                const data = await res.json();
                document.getElementById('resultBox').innerHTML = `<img src="${data.mask_img}" class="img-fluid rounded" style="max-height:280px;">`;
                showToast('预测完成');
            }catch(e){
                showToast('预测失败：'+e.message, false);
            }finally{
                btn.disabled = false; btn.innerText = '开始预测';
            }
        }
    </script>
</body>
</html>
